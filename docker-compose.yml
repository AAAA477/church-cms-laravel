# Church CMS — full production stack.
#   nginx (edge, :80) ── /admin,/api,/storage,... ──> backend  (Laravel, Apache)
#                     └─ everything else ───────────> frontend (Next.js standalone)
#   backend + scheduler ──> db (Postgres 16)
#
# All service config lives in deploy/docker.env (copy from
# deploy/docker.env.example). Build/run order matters the FIRST time only,
# because `next build` prerenders pages against the live Laravel API:
#
#   docker compose up -d db backend        # wait until healthy
#   docker compose build frontend
#   docker compose up -d
#
# Full walkthrough (local test + VPS deploy + TLS): deploy/DOCKER.md

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: deploy/docker.env
    volumes:
      - dbdata:/var/lib/postgresql/data
      # .sql/.sql.gz files here are imported ONCE, on first start with an
      # empty data volume (put your pg_dump of the dev DB here before that).
      - ./deploy/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-churchcms}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: .
    restart: unless-stopped
    env_file: deploy/docker.env
    environment:
      MIGRATE_ON_START: "1"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - laravel-storage:/var/www/html/storage
      - laravel-uploads:/var/www/html/public/uploads
    # Published on loopback only: used by the frontend image build
    # (host.docker.internal:8000) and handy for debugging. Not public.
    # On a Linux VPS, host.docker.internal resolves to the docker bridge
    # (usually 172.17.0.1), which cannot reach a loopback-bound port —
    # change this line to "172.17.0.1:8000:80" there (still not public).
    ports:
      - "127.0.0.1:8000:80"

  scheduler:
    build: .
    restart: unless-stopped
    command: ["scheduler"]
    env_file: deploy/docker.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - laravel-storage:/var/www/html/storage
      - laravel-uploads:/var/www/html/public/uploads

  frontend:
    build:
      context: ./frontend
      args:
        # Build-time only: prerendering fetches through the backend's
        # host-published port. Runtime traffic uses the internal hostname
        # from deploy/docker.env instead.
        API_URL: http://host.docker.internal:8000
        # On the VPS, export SITE_URL=https://your-domain.com before building.
        SITE_URL: ${SITE_URL:-http://localhost:8090}
        CHURCH_ID: "1"
        # Set to "1" only for local topology tests (see deploy/DOCKER.md).
        LOCAL_TOPOLOGY_TEST: ${LOCAL_TOPOLOGY_TEST:-0}
      extra_hosts:
        - "host.docker.internal:host-gateway"
    restart: unless-stopped
    env_file: deploy/docker.env
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8090:80"       # local test; on the VPS change to 80:80 + 443:443
    volumes:
      - ./deploy/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - backend
      - frontend

  # TLS certificates (VPS only): run once interactively to issue, then the
  # profile keeps it out of a plain `docker compose up`.
  #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d example.com
  # Renewal (cron/systemd timer):
  #   docker compose run --rm certbot renew && docker compose exec nginx nginx -s reload
  certbot:
    image: certbot/certbot
    profiles: ["tls"]
    volumes:
      - certbot-webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  dbdata:
  laravel-storage:
  laravel-uploads:
  certbot-webroot:
  letsencrypt:
