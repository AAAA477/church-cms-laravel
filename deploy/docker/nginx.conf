# Church CMS — Docker edge proxy.
# Same path split as deploy/nginx.conf.example, but targeting the compose
# service names. Upstreams are held in variables so nginx re-resolves them
# through Docker's embedded DNS (127.0.0.11) on every request — a static
# upstream{} block caches container IPs at startup and starts throwing 502s
# as soon as a service is rebuilt/recreated.
#
# TLS is terminated here in production — see deploy/DOCKER.md; the commented
# 443 server block below is the template.

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s;
    set $laravel http://backend:80;
    set $nextjs  http://frontend:3000;

    client_max_body_size 64m;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ACME challenge for certbot (webroot mode). Harmless when unused.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ---- Laravel-owned paths ----
    location /admin/    { proxy_pass $laravel; }
    location /api/      { proxy_pass $laravel; }
    location = /login   { proxy_pass $laravel; }
    location /storage/  { proxy_pass $laravel; }
    location /uploads/  { proxy_pass $laravel; }
    location /guest/    { proxy_pass $laravel; }
    location /vendor/   { proxy_pass $laravel; }

    # ---- Everything else: Next.js (public site, /member/*, /bff/*) ----
    location / {
        proxy_pass $nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

